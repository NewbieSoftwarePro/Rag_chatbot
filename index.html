<!DOCTYPE html>
<html>
<head>
    <title>Rice Disease RAG Chatbot</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        height: 100%;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0d0d0d;
        color: #ececec;
        display: flex;
        flex-direction: column;
    }

    .app-header {
        background: #171717;
        border-bottom: 1px solid #2a2a2a;
        padding: 16px 28px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
    }

    .app-header .icon {
        font-size: 24px;
    }

    .app-header h1 {
        font-size: 16px;
        font-weight: 600;
        background: linear-gradient(90deg, #b478ff, #7b2ff7);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .app-header p {
        font-size: 12px;
        color: #8e8e8e;
        margin-top: 2px;
    }

    #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 30px 0 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .message-row {
        max-width: 700px;
        width: 90%;
        margin: 0 auto;
        display: flex;
        align-items: flex-end;
        gap: 10px;
        animation: fadeSlideIn 0.25s ease;
    }

    @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .message-row.user-row {
        flex-direction: row-reverse;
    }

    .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
    }

    .user-row .avatar {
        background: linear-gradient(135deg, #7b2ff7, #a663fb);
    }

    .bot-row .avatar {
        background: #1e1e1e;
        border: 1px solid #2a2a2a;
    }

    .message-content {
        display: flex;
        flex-direction: column;
        max-width: 75%;
    }

    .user-row .message-content {
        align-items: flex-end;
    }

    .message {
        padding: 12px 17px;
        border-radius: 18px;
        line-height: 1.55;
        font-size: 14.5px;
        word-wrap: break-word;
    }

    .user-message {
        background: linear-gradient(135deg, #7b2ff7, #a663fb);
        color: white;
        border-bottom-right-radius: 5px;
    }

    .bot-message {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        color: #ececec;
        border-bottom-left-radius: 5px;
    }

    .timestamp {
        font-size: 10.5px;
        color: #6e6e6e;
        margin-top: 4px;
        padding: 0 4px;
    }

    .typing-dots {
        display: inline-flex;
        gap: 4px;
        padding: 4px 2px;
    }

    .typing-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #a663fb;
        animation: blink 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
        0%, 80%, 100% { opacity: 0.3; }
        40% { opacity: 1; }
    }

    .input-zone {
        flex-shrink: 0;
        padding: 18px 0 26px;
        background: linear-gradient(180deg, rgba(13,13,13,0), #0d0d0d 30%);
    }

    .input-bar {
        max-width: 700px;
        width: 90%;
        margin: 0 auto;
        display: flex;
        gap: 10px;
        background: #171717;
        border: 1px solid #2a2a2a;
        border-radius: 26px;
        padding: 6px 6px 6px 20px;
    }

    #question-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #ececec;
        font-size: 14.5px;
        padding: 10px 0;
    }

    #question-input::placeholder {
        color: #6e6e6e;
    }

    #send-button {
        padding: 0 22px;
        border-radius: 22px;
        border: none;
        background: linear-gradient(135deg, #7b2ff7, #a663fb);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    #send-button:hover {
        opacity: 0.88;
    }

    #chat-box::-webkit-scrollbar {
        width: 8px;
    }
    #chat-box::-webkit-scrollbar-thumb {
        background: #2a2a2a;
        border-radius: 8px;
    }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="icon">🌾</div>
        <div>
            <h1>Rice Disease Research Assistant</h1>
            <p>Ask questions about your ingested research papers</p>
        </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-zone">
        <div class="input-bar">
            <input type="text" id="question-input" placeholder="Message Rice Disease Assistant...">
            <button id="send-button">Send</button>
        </div>
    </div>

    <script>
        const API_URL = "https://rag-chatbot-d6a29b32.fastapicloud.dev";

        let messages = [];

        function currentTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        function renderMessages() {
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML = "";

            messages.forEach((msg) => {
                const row = document.createElement("div");
                row.className = msg.role === "user" ? "message-row user-row" : "message-row bot-row";

                const avatar = document.createElement("div");
                avatar.className = "avatar";
                avatar.innerText = msg.role === "user" ? "🧑" : "🌾";

                const content = document.createElement("div");
                content.className = "message-content";

                const bubble = document.createElement("div");
                bubble.className = msg.role === "user" ? "message user-message" : "message bot-message";

                if (msg.typing) {
                    bubble.innerHTML = `<span class="typing-dots"><span></span><span></span><span></span></span>`;
                } else {
                    bubble.innerText = msg.text;
                }

                content.appendChild(bubble);

                if (!msg.typing) {
                    const time = document.createElement("div");
                    time.className = "timestamp";
                    time.innerText = msg.time;
                    content.appendChild(time);
                }

                row.appendChild(avatar);
                row.appendChild(content);
                chatBox.appendChild(row);
            });

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("question-input");
            const question = input.value;
            if (!question.trim()) return;

            messages.push({ role: "user", text: question, time: currentTime() });
            renderMessages();
            input.value = "";

            messages.push({ role: "bot", typing: true });
            renderMessages();

            try {
                const response = await fetch(`${API_URL}/query`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();
                messages.pop();
                messages.push({ role: "bot", text: data.answer, time: currentTime() });
            } catch (error) {
                messages.pop();
                messages.push({ role: "bot", text: "⚠️ Couldn't reach the server. Is it running?", time: currentTime() });
            }

            renderMessages();
        }

        document.getElementById("send-button").addEventListener("click", sendMessage);

        document.getElementById("question-input").addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
